# Application Properties
spring.application.name=job-portal-backend

# Server Port
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/job_portal_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret Key (change in production)
app.jwt.secret=JobPortalSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000
